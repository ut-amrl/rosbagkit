bagfile_root: UT-SARA-GQ/rosbags_public
output_root: UT-SARA-GQ/processed

topics:
  /trevor/odom:
    format: csv
    outpath: odom.csv
  /trevor/gps:
    format: csv
    outpath: gps.csv
  /trevor/stereo_left/image_rect_color/compressed:
    format: image
    outdir: 2d_raw/cam_left
  /trevor/stereo_right/image_rect_color/compressed:
    format: image
    outdir: 2d_raw/cam_right

rectification:
  enabled: true
  left_topic: /trevor/stereo_left/image_rect_color/compressed
  right_topic: /trevor/stereo_right/image_rect_color/compressed
  left_calib: UT-SARA-GQ/calibration/cam_left_intrinsics.yaml
  right_calib: UT-SARA-GQ/calibration/cam_right_intrinsics.yaml
  extrinsics: UT-SARA-GQ/calibration/cam_left_to_right.yaml
  threshold: 0.1
  output_dir: 2d_rect
  left_subdir: cam_left
  right_subdir: cam_right
  timestamp_file: timestamps.txt
  left_prefix: 2d_rect_left_
  right_prefix: 2d_rect_right_

