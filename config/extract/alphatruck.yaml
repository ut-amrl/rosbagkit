bagfile_root: /path/to/bagfiles
output_root: /path/to/output/alphatruck

topics:
  /camera/camera/color/image_raw:
    format: image
    outdir: image_raw
  /camera/camera/depth/image_rect_raw:
    format: depth
    outdir: depth

scenes:
  example_loop:
    bagfiles:
      - split_00/example_loop
    start: 0
    end: -1

  example_return:
    bagfiles:
      - split_00/example_return
    start: 0
    end: -1
